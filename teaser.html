<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Urban3DQuest.fr · Jadikan · Teaser</title>
  <meta name="theme-color" content="#140f1f">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#140f1f;
      --bg2:#1f1532;
      --ink:#f6f1ff;
      --ink2:#c9badf;
      --line:rgba(246,241,255,.18);
      --pink:#ff4ea7;
      --cyan:#3de4ff;
      --amber:#ffbe4f;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;min-height:100%}
    body{
      font-family:'Space Grotesk',sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 15% 10%, rgba(255,78,167,.28), transparent 45%),
        radial-gradient(circle at 85% 20%, rgba(61,228,255,.23), transparent 42%),
        radial-gradient(circle at 60% 85%, rgba(255,190,79,.16), transparent 48%),
        linear-gradient(160deg, var(--bg) 0%, var(--bg2) 55%, #0f0a18 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px 16px calc(24px + env(safe-area-inset-bottom));
      overflow-x:hidden;
    }
    .card{
      width:min(680px, 100%);
      border:1px solid var(--line);
      border-radius:24px;
      background:rgba(20,15,31,.68);
      backdrop-filter: blur(8px);
      padding:24px;
      box-shadow:0 20px 50px rgba(0,0,0,.38);
    }
    .kicker{
      font-family:'JetBrains Mono',monospace;
      font-size:.72rem;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--cyan);
      margin:0 0 10px;
    }
    h1{
      margin:0;
      font-size:clamp(1.5rem, 5vw, 2.4rem);
      line-height:1.05;
      letter-spacing:.01em;
    }
    .subtitle{
      margin:14px 0 18px;
      color:var(--ink2);
      font-size:clamp(.95rem,2.8vw,1.05rem);
      line-height:1.45;
      white-space:pre-line;
    }
    .count-wrap{
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      background:rgba(8,6,14,.36);
      margin-bottom:16px;
    }
    .count-title{
      font-family:'JetBrains Mono',monospace;
      font-size:.72rem;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--amber);
      margin:0 0 10px;
    }
    .count-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:8px;
    }
    .box{
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 8px;
      text-align:center;
      background:rgba(255,255,255,.02);
    }
    .num{
      font-family:'JetBrains Mono',monospace;
      font-weight:700;
      font-size:clamp(1.1rem,4.4vw,1.4rem);
      color:var(--ink);
      line-height:1;
    }
    .lbl{
      margin-top:4px;
      font-size:.68rem;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--ink2);
    }
    .meta{
      color:var(--ink2);
      font-size:.82rem;
      margin:0 0 14px;
      font-family:'JetBrains Mono',monospace;
    }
    .cta{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:48px;
      border-radius:12px;
      border:1px solid rgba(255,78,167,.5);
      background:linear-gradient(135deg, var(--pink), #bf2fff);
      color:#fff;
      text-decoration:none;
      padding:0 18px;
      font-weight:800;
      letter-spacing:.02em;
      box-shadow:0 8px 20px rgba(255,78,167,.28);
    }
    .cta:active{transform:translateY(1px)}
    .hint{margin:10px 0 0;color:var(--ink2);font-size:.78rem}
    .off{color:#fecaca}
    @media (max-width:520px){
      .card{padding:18px}
      .count-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    }
  </style>
</head>
<body>
  <section class="card" aria-live="polite">
    <p class="kicker">Urban3DQuest.fr · Jadikan</p>
    <h1 id="teaserTitle">Le prochain drop arrive</h1>
    <p class="subtitle" id="teaserSubtitle">Pré-inscriptions bientôt ouvertes.</p>

    <div class="count-wrap">
      <p class="count-title">Compte à rebours</p>
      <div class="count-grid" id="countGrid">
        <div class="box"><div class="num" id="dd">00</div><div class="lbl">Jours</div></div>
        <div class="box"><div class="num" id="hh">00</div><div class="lbl">Heures</div></div>
        <div class="box"><div class="num" id="mm">00</div><div class="lbl">Minutes</div></div>
        <div class="box"><div class="num" id="ss">00</div><div class="lbl">Secondes</div></div>
      </div>
    </div>

    <p class="meta" id="teaserMeta">Objectif: 30/05/2026 15:08:00</p>
    <a class="cta" id="teaserCta" href="https://www.instagram.com/jadikan/" target="_blank" rel="noopener noreferrer">Je veux être prévenu</a>
    <p class="hint" id="teaserHint"></p>
  </section>

  <script>
    // Emergency static mode: no Supabase read to keep public egress near zero.
    const TEASER_CONFIG = {
      enabled: false,
      title: 'Urban3DQuest.fr · Jadikan',
      subtitle: 'Le prochain drop arrive. Laisse ton blase, on te previent.',
      targetAt: '2026-05-30T15:08:00+02:00',
      ctaLabel: 'Je veux etre prevenu',
      ctaUrl: 'https://instagram.com/jadikan'
    };

    const pad = (n) => String(Math.max(0, n)).padStart(2, '0');

    function renderCountdown(targetAt) {
      const dd = document.getElementById('dd');
      const hh = document.getElementById('hh');
      const mm = document.getElementById('mm');
      const ss = document.getElementById('ss');
      const meta = document.getElementById('teaserMeta');

      const target = targetAt ? new Date(targetAt).getTime() : NaN;
      if (!Number.isFinite(target)) {
        meta.textContent = 'Date teaser non configurée dans l\'admin.';
        return;
      }

      function tick() {
        const now = Date.now();
        const delta = target - now;
        if (delta <= 0) {
          dd.textContent = '00'; hh.textContent = '00'; mm.textContent = '00'; ss.textContent = '00';
          meta.textContent = 'C\'est lancé.';
          return;
        }
        const totalSec = Math.floor(delta / 1000);
        const d = Math.floor(totalSec / 86400);
        const h = Math.floor((totalSec % 86400) / 3600);
        const m = Math.floor((totalSec % 3600) / 60);
        const s = totalSec % 60;
        dd.textContent = pad(d);
        hh.textContent = pad(h);
        mm.textContent = pad(m);
        ss.textContent = pad(s);
      }

      const dt = new Date(target);
      meta.textContent = 'Objectif: ' + dt.toLocaleString('fr-FR');
      tick();
      setInterval(tick, 1000);
    }

    function init() {
      const title = document.getElementById('teaserTitle');
      const subtitle = document.getElementById('teaserSubtitle');
      const cta = document.getElementById('teaserCta');
      const hint = document.getElementById('teaserHint');

      title.textContent = TEASER_CONFIG.title;
      subtitle.textContent = TEASER_CONFIG.subtitle;
      cta.textContent = TEASER_CONFIG.ctaLabel;
      cta.href = TEASER_CONFIG.ctaUrl;
      hint.textContent = TEASER_CONFIG.enabled ? 'Landing teaser active.' : 'Landing teaser desactivee temporairement.';
      hint.className = TEASER_CONFIG.enabled ? 'hint' : 'hint off';

      if (!TEASER_CONFIG.enabled) {
        document.getElementById('countGrid').style.display = 'none';
        document.getElementById('teaserMeta').textContent = 'Teaser desactive temporairement.';
        cta.style.display = 'none';
        return;
      }

      renderCountdown(TEASER_CONFIG.targetAt);
    }
    init();
  </script>
</body>
</html>
